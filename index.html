<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Héctor Admin | Panel Maestro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { 
            background: #1e1e1e; padding: 20px; border-radius: 20px; 
            border: 2px solid #1b5e20; max-width: 600px; margin: auto; 
            position: sticky; top: 10px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { padding: 15px; font-size: 20px; width: 70%; border-radius: 10px; border: none; margin-bottom: 15px; text-align: center; text-transform: uppercase; font-weight: bold; }
        button { padding: 12px 20px; font-size: 16px; background: #1b5e20; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        button:hover { background: #2e7d32; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        
        #grid-codigos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 10px; margin-top: 30px; padding: 10px;
        }
        .codigo-item { 
            background: #2a2a2a; padding: 10px; border-radius: 5px; font-size: 12px; 
            border: 1px solid #444; transition: 0.3s; font-weight: bold;
        }
        .ganador-item { 
            border: 1px solid #ffd700 !important; color: #ffd700; background: #2c2500;
        }
        .tachado { 
            text-decoration: line-through; color: #ff4444 !important; opacity: 0.4; 
            border-color: #ff4444 !important; background: #1a0000 !important;
        }
        #resultado { font-size: 22px; font-weight: bold; margin: 15px 0; min-height: 30px; }
        .resumen { font-size: 14px; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🛡️ Héctor Control v2.0</h1>
        <div id="resumen-tanda" class="resumen">Esperando generación...</div>
        <button id="btnGenerar" onclick="generarNuevos100(true)">GENERAR 100 CÓDIGOS</button>
        <br><br>
        <input type="text" id="admin-input" placeholder="Escribe el código aquí">
        <button onclick="checarMaster()">VERIFICAR Y TACHAR</button>
        <div id="resultado"></div>
    </div>

    <div id="grid-codigos"></div>

<script>
    let listaCodigos = JSON.parse(localStorage.getItem('hector_lista')) || [];
    let usados = JSON.parse(localStorage.getItem('hector_usados')) || [];

    actualizarVista();

    function generarNuevos100(manual = false) {
        // Si es manual (botón), validar que la tanda terminó
        if (manual && listaCodigos.length > 0 && usados.length < listaCodigos.length) {
            alert(`Aún quedan códigos por usar.`);
            return;
        }

        const letras = "ABCDEFGHJKLMNPQRSTUVWXYZ";
        const nums = "23456789";
        listaCodigos = [];
        usados = [];

        for(let i=0; i<100; i++) {
            let c = "HB-" + letras[Math.floor(Math.random()*letras.length)] + 
                    nums[Math.floor(Math.random()*nums.length)] + 
                    letras[Math.floor(Math.random()*letras.length)];
            
            if(!listaCodigos.includes(c)) {
                listaCodigos.push(c);
            } else {
                i--;
            }
        }

        guardarYRefrescar();
        if(!manual) {
            document.getElementById("resultado").innerHTML = "✨ ¡NUEVA TANDA GENERADA AUTOMÁTICAMENTE!";
            document.getElementById("resultado").style.color = "cyan";
        }
    }

    // Función auxiliar para saber si un código es ganador según la lógica matemática
    function esCodigoGanador(c) {
        let hash = 0;
        for (let i = 0; i < c.length; i++) {
            hash = c.charCodeAt(i) + ((hash << 5) - hash);
        }
        return (Math.abs(hash) % 100) < 3;
    }

        const cod = inputField.value.trim().toUpperCase();
        const res = document.getElementById("resultado");

        if (!listaCodigos.includes(cod)) {
            res.innerHTML = "⚠️ ESE CÓDIGO NO ES DE ESTA TANDA";
            res.style.color = "orange";
            return;
        }

        if (usados.includes(cod)) {
            res.innerHTML = "⌛ CÓDIGO YA FUE USADO ANTES";
            res.style.color = "#aaa";
            return;
