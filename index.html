<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Héctor Admin | Panel Maestro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { 
            background: #1e1e1e; padding: 20px; border-radius: 20px; 
            border: 2px solid #1b5e20; max-width: 600px; margin: auto; 
            position: sticky; top: 10px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { padding: 15px; font-size: 20px; width: 70%; border-radius: 10px; border: none; margin-bottom: 15px; text-align: center; text-transform: uppercase; font-weight: bold; background: #333; color: white; }
        button { padding: 12px 20px; font-size: 16px; background: #1b5e20; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        button:hover { background: #2e7d32; }
        
        #grid-codigos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 10px; margin-top: 30px; padding: 10px;
        }
        .codigo-item { 
            background: #2a2a2a; padding: 10px; border-radius: 5px; font-size: 11px; 
            border: 1px solid #444; transition: 0.3s; font-weight: bold; color: #eee;
        }
        .ganador-item { border: 1px solid #ffd700 !important; color: #ffd700 !important; background: #2c2500; }
        
        /* ESTADO TACHADO (FIREBASE) */
        .tachado { 
            text-decoration: line-through; 
            color: #ffffff !important; 
            opacity: 0.8; 
            border-color: #ff4444 !important; 
            background: #e53935 !important; /* Rojo fuerte */
        }
        
        #resultado { font-size: 22px; font-weight: bold; margin: 15px 0; min-height: 30px; }
        .resumen { font-size: 14px; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🛡️ Héctor Control v2.0</h1>
        <div id="resumen-tanda" class="resumen">Cargando datos...</div>
        <button id="btnGenerar" onclick="generarNuevos100(true)">GENERAR 100 CÓDIGOS</button>
        <br><br>
        <input type="text" id="admin-input" placeholder="Escribe el código aquí">
        <button onclick="checarMaster()">VERIFICAR Y TACHAR</button>
        <div id="resultado"></div>
    </div>

    <div id="grid-codigos"></div>

<script>
    // --- CONFIGURACIÓN FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAJb-fRgRJlMS1AZDmRs1iRZivbVb2xIaY",
        authDomain: "hector-bites.firebaseapp.com",
        projectId: "hector-bites",
        storageBucket: "hector-bites.firebasestorage.app",
        messagingSenderId: "871681076585",
        appId: "1:871681076585:web:ef3ead36c2b21ec70021f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Variables locales
    let listaCodigos = JSON.parse(localStorage.getItem('hector_lista')) || [];

    // Probabilidad de ganador (coincide con tu app de ventas)
    function esCodigoGanador(c) {
        let hash = 0;
        for (let i = 0; i < c.length; i++) hash = c.charCodeAt(i) + ((hash << 5) - hash);
        return (Math.abs(hash) % 100) < 10; 
    }

    function actualizarVista() {
        const grid = document.getElementById("grid-codigos");
        grid.innerHTML = "";

        if (listaCodigos.length === 0) {
            document.getElementById("resumen-tanda").innerText = "Presiona el botón para empezar.";
            return;
        }

        listaCodigos.forEach(c => {
            const gano = esCodigoGanador(c);
            const div = document.createElement("div");
            div.className = "codigo-item";
            div.innerText = c;
            div.id = `btn-${c}`; // ID CLAVE para que Firebase lo encuentre

            if (gano) {
                div.classList.add("ganador-item");
                div.innerText += " ⭐";
            }
            grid.appendChild(div);
        });

        conectarFirebaseRealtime();
    }

    // FUNCIÓN CLAVE: Escucha a Firebase y tacha en vivo
    function conectarFirebaseRealtime() {
        db.collection("Codigos").onSnapshot((snapshot) => {
            let totalTachados = 0;
            snapshot.forEach((doc) => {
                const codigoID = doc.id;
                const elemento = document.getElementById(`btn-${codigoID}`);
                if (elemento) {
                    elemento.classList.add("tachado");
                    elemento.innerHTML = "❌ " + codigoID;
                    totalTachados++;
                }
            });
            document.getElementById("resumen-tanda").innerHTML = `Tachados en Firebase: <b>${totalTachados} / 100</b>`;
        });
    }

    function generarNuevos100(manual) {
        if (manual && !confirm("¿Generar nueva lista? Se borrarán los IDs anteriores.")) return;

        const letras = "ABCDEFGHJKLMNPQRSTUVWXYZ";
        const nums = "23456789";
        listaCodigos = [];

        while (listaCodigos.length < 100) {
            let c = "HB-" + letras[Math.floor(Math.random()*letras.length)] + 
                    nums[Math.floor(Math.random()*nums.length)] + 
                    letras[Math.floor(Math.random()*letras.length)];
            if(!listaCodigos.includes(c)) listaCodigos.push(c);
        }

        localStorage.setItem('hector_lista', JSON.stringify(listaCodigos));
        actualizarVista();
        document.getElementById("resultado").innerText = "✨ NUEVA TANDA LISTA";
    }

    // Función para tachar manualmente desde el panel si es necesario
    async function checarMaster() {
        const inputField = document.getElementById("admin-input");
        const cod = inputField.value.trim().toUpperCase();
        if(!cod) return;

        try {
            await db.collection("Codigos").doc(cod).set({
                usado: true,
                admin: true,
                fecha: firebase.firestore.FieldValue.serverTimestamp()
            });
            inputField.value = "";
            document.getElementById("resultado").innerText = "✅ TACHADO MANUALMENTE";
        } catch (e) {
            alert("Error al conectar con Firebase");
        }
    }

    window.onload = actualizarVista;
</script>
</body>
</html>
