<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Héctor Admin | Panel Maestro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { 
            background: #1e1e1e; padding: 20px; border-radius: 20px; 
            border: 2px solid #1b5e20; max-width: 600px; margin: auto; 
            position: sticky; top: 10px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { padding: 15px; font-size: 20px; width: 70%; border-radius: 10px; border: none; margin-bottom: 15px; text-align: center; text-transform: uppercase; font-weight: bold; }
        button { padding: 12px 20px; font-size: 16px; background: #1b5e20; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        button:hover { background: #2e7d32; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        
        #grid-codigos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 10px; margin-top: 30px; padding: 10px;
        }
        .codigo-item { 
            background: #2a2a2a; padding: 10px; border-radius: 5px; font-size: 12px; 
            border: 1px solid #444; transition: 0.3s; font-weight: bold;
        }
        .ganador-item { 
            border: 1px solid #ffd700 !important; color: #ffd700; background: #2c2500;
        }
        .tachado { 
            text-decoration: line-through; color: #ff4444 !important; opacity: 0.4; 
            border-color: #ff4444 !important; background: #1a0000 !important;
        }
        #resultado { font-size: 22px; font-weight: bold; margin: 15px 0; min-height: 30px; }
        .resumen { font-size: 14px; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🛡️ Héctor Control v2.0</h1>
        <div id="resumen-tanda" class="resumen">Esperando generación...</div>
        <button id="btnGenerar" onclick="generarNuevos100()">GENERAR 100 CÓDIGOS</button>
        <br><br>
        <input type="text" id="admin-input" placeholder="Escribe el código aquí">
        <button onclick="checarMaster()">VERIFICAR Y TACHAR</button>
        <div id="resultado"></div>
    </div>

    <div id="grid-codigos"></div>

<script>
    let listaCodigos = JSON.parse(localStorage.getItem('hector_lista')) || [];
    let usados = JSON.parse(localStorage.getItem('hector_usados')) || [];

    // Cargar datos al abrir la página
    actualizarVista();

    function generarNuevos100() {
        // Solo permite generar si no hay códigos o si ya se usaron los 100 anteriores
        if (listaCodigos.length > 0 && usados.length < listaCodigos.length) {
            alert(`¡Alto! Aún te faltan ${listaCodigos.length - usados.length} códigos por verificar de la tanda actual.`);
            return;
        }

        const letras = "ABCDEFGHJKLMNPQRSTUVWXYZ";
        const nums = "23456789";
        listaCodigos = [];
        usados = [];

        for(let i=0; i<100; i++) {
            // Genera código aleatorio de 3 dígitos después del HB-
            let c = "HB-" + letras[Math.floor(Math.random()*letras.length)] + 
                    nums[Math.floor(Math.random()*nums.length)] + 
                    letras[Math.floor(Math.random()*letras.length)];
            
            // Evitar duplicados en la misma tanda
            if(!listaCodigos.includes(c)) {
                listaCodigos.push(c);
            } else {
                i--; // Reintentar si salió repetido
            }
        }

        guardarYRefrescar();
    }

    function checarMaster() {
        const inputField = document.getElementById("admin-input");
        const cod = inputField.value.trim().toUpperCase();
        const res = document.getElementById("resultado");

        if(!cod) return;

        // 1. ¿Existe en la lista de los 100?
        if (!listaCodigos.includes(cod)) {
            res.innerHTML = "⚠️ ESE CÓDIGO NO ES DE ESTA TANDA";
            res.style.color = "orange";
            return;
        }

        // 2. ¿Ya fue usado/tachado antes?
        if (usados.includes(cod)) {
            res.innerHTML = "⌛ CÓDIGO YA FUE USADO ANTES";
            res.style.color = "#aaa";
            return;
        }

        // 3. Aplicar fórmula matemática de premio
        let hash = 0;
        for (let i = 0; i < cod.length; i++) {
            hash = cod.charCodeAt(i) + ((hash << 5) - hash);
        }
        const esGanador = (Math.abs(hash) % 100) < 3; // Misma probabilidad 3%

        // 4. Agregar a lista de usados y refrescar vista
        usados.push(cod);
        guardarYRefrescar();
        inputField.value = ""; // Limpiar el input

        if(esGanador) {
            res.innerHTML = "✅ ¡GANADOR CONFIRMADO! 🎁";
            res.style.color = "#00ff00";
        } else {
            res.innerHTML = "❌ PERDEDOR (Sigue intentando)";
            res.style.color = "#ff4444";
        }
    }

    function guardarYRefrescar() {
        localStorage.setItem('hector_lista', JSON.stringify(listaCodigos));
        localStorage.setItem('hector_usados', JSON.stringify(usados));
        actualizarVista();
    }

    function actualizarVista() {
        const grid = document.getElementById("grid-codigos");
        const btn = document.getElementById("btnGenerar");
        const resumenText = document.getElementById("resumen-tanda");
        grid.innerHTML = "";

        let contadorGanadores = 0;

        listaCodigos.forEach(c => {
            const div = document.createElement("div");
            
            // Calcular si es ganador para el modo inspector (estrella)
            let hash = 0;
            for (let i = 0; i < c.length; i++) { hash = c.charCodeAt(i) + ((hash << 5) - hash); }
            const esGanador = (Math.abs(hash) % 100) < 3;

            let clases = "codigo-item";
            let contenido = c;

            if (esGanador) {
                clases += " ganador-item";
                contenido += " ⭐";
                contadorGanadores++;
            }
            if (usados.includes(c)) {
                clases += " tachado";
            }

            div.className = clases;
            div.innerHTML = contenido;
            grid.appendChild(div);
        });

        // Actualizar estados del botón y textos
        if (listaCodigos.length > 0) {
            const faltan = listaCodigos.length - usados.length;
            resumenText.innerHTML = `Tanda actual: <b>${listaCodigos.length}</b> códigos | Ganadores con estrella: <b>${contadorGanadores}</b>`;
            
            if (faltan > 0) {
                btn.disabled = true;
                btn.innerText = `BLOQUEADO: FALTAN ${faltan} CÓDIGOS`;
            } else {
                btn.disabled = false;
                btn.innerText = "¡TANDA TERMINADA! GENERAR OTROS 100";
            }
        } else {
            resumenText.innerText = "No hay códigos activos. Presiona el botón verde.";
        }
    }
</script>
</body>
</html>
